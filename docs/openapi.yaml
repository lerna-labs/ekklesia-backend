openapi: 3.0.3
info:
  title: Ekklesia Voting Backend API
  description: |
    API for the Ekklesia voting system backend. This API provides endpoints for managing ballots, proposals, votes, comments, and voter authentication.
    
    ## Authentication
    Most endpoints require authentication via JWT token. The token is obtained through the session endpoints and is sent via HTTP-only cookie or Authorization header.
    
    ## MultiSig Support
    The API supports both standard wallet authentication and multisig wallet authentication. Use the `/multisig` endpoints for multisig wallets.
  version: 0.5.32
  contact:
    name: Adam Dean, Mad Orkestra
    license: ISC

servers:
  - url: http://localhost:3000/api/v0
    description: Local development server
  - url: https://api.example.com/api/v0
    description: Production server (replace with actual URL)

tags:
  - name: Status
    description: System status and health check endpoints
  - name: Ballots
    description: Ballot management and retrieval
  - name: Proposals
    description: Proposal management and retrieval
  - name: Votes
    description: Vote submission and management
  - name: Comments
    description: Comment management
  - name: Session
    description: Authentication and session management
  - name: Dashboard
    description: User dashboard and voting checkout
  - name: Transactions
    description: Transaction management
  - name: Voters
    description: Voter information and statistics
  - name: FAQs
    description: Frequently asked questions

paths:
  /status:
    get:
      tags:
        - Status
      summary: Get system status
      description: Returns comprehensive system status information including server uptime, versions, database connection status, and network information
      operationId: getStatus
      responses:
        '200':
          description: System status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          $ref: '#/components/responses/ServerError'
  /status/health:
    get:
      tags:
        - Status
      summary: Health check
      description: Simple health check endpoint for load balancers and monitoring tools
      operationId: getHealth
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
  /status/db:
    get:
      tags:
        - Status
      summary: Database connection status
      description: Returns the current database connection status
      operationId: getDatabaseStatus
      responses:
        '200':
          description: Database connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [connected, disconnected]
                  message:
                    type: string

  /ballots:
    get:
      tags:
        - Ballots
      summary: Get all ballots
      description: Get all ballots with pagination, filtering, and search capabilities
      operationId: getBallots
      parameters:
        - name: voterType
          in: query
          description: Filter by voter type
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
            enum: [live, closed, upcoming]
        - name: search
          in: query
          description: Search term for ballot title or ID
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page (max 100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: List of ballots with pagination metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ballot'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
    /voterTypes:
      get:
        tags:
          - Ballots
        summary: Get all unique voter types
        description: Returns an array of all unique voter types from all ballots
        operationId: getVoterTypes
        responses:
          '200':
            description: Array of unique voter types
            content:
              application/json:
                schema:
                  type: array
                  items:
                    type: string
          '500':
            $ref: '#/components/responses/ServerError'
    /{ballotId}:
      get:
        tags:
          - Ballots
        summary: Get a specific ballot
        description: Get a specific ballot by ID with voter validation if token is present
        operationId: getBallot
        parameters:
          - name: ballotId
            in: path
            required: true
            description: The ID of the ballot to retrieve
            schema:
              type: string
        responses:
          '200':
            description: The ballot object with additional voter-specific data if authenticated
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/Ballot'
                    - type: object
                      properties:
                        voterValidated:
                          type: boolean
                        votingPower:
                          type: number
                        totalAllowedVoterCount:
                          type: number
                        totalVotingPower:
                          type: number
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/ServerError'
      /proposals:
        get:
          tags:
            - Ballots
          summary: Get proposals for a ballot
          description: Get all proposals for a specific ballot with filtering, sorting, and pagination
          operationId: getBallotProposals
          parameters:
            - name: ballotId
              in: path
              required: true
              description: The ID of the ballot
              schema:
                type: string
            - name: page
              in: query
              description: Page number for pagination
              required: false
              schema:
                type: integer
                minimum: 1
                default: 1
            - name: limit
              in: query
              description: Number of items per page (max 100)
              required: false
              schema:
                type: integer
                minimum: 1
                maximum: 100
                default: 10
            - name: search
              in: query
              description: Search term for proposal title or ID
              required: false
              schema:
                type: string
            - name: sort
              in: query
              description: Sort field
              required: false
              schema:
                type: string
                enum: [title, commentCount, voteCount]
                default: _id
            - name: direction
              in: query
              description: Sort direction
              required: false
              schema:
                type: string
                enum: [asc, desc]
                default: desc
            - name: hasVoted
              in: query
              description: Filter by whether authenticated user has voted (only works when authenticated)
              required: false
              schema:
                type: string
                enum: [true, false]
            - name: tags
              in: query
              description: Filter by tags (comma-separated)
              required: false
              schema:
                type: string
            - name: categories
              in: query
              description: Filter by categories (comma-separated)
              required: false
              schema:
                type: string
          responses:
            '200':
              description: List of proposals with pagination and filter metadata
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Proposal'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
                      sort:
                        type: object
                        properties:
                          field:
                            type: string
                          direction:
                            type: string
                      filters:
                        type: object
            '400':
              $ref: '#/components/responses/BadRequest'
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'
      /categories:
        get:
          tags:
            - Ballots
          summary: Get unique categories for a ballot
          description: Get all unique categories from proposals in a specific ballot
          operationId: getBallotCategories
          parameters:
            - name: ballotId
              in: path
              required: true
              description: The ID of the ballot
              schema:
                type: string
          responses:
            '200':
              description: List of unique categories
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      type: string
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'
      /tags:
        get:
          tags:
            - Ballots
          summary: Get unique tags for a ballot
          description: Get all unique tags from proposals in a specific ballot
          operationId: getBallotTags
          parameters:
            - name: ballotId
              in: path
              required: true
              description: The ID of the ballot
              schema:
                type: string
          responses:
            '200':
              description: List of unique tags
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      type: string
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'

  /proposals:
    /{proposalId}:
      get:
        tags:
          - Proposals
        summary: Get a proposal by ID
        description: Get a proposal by ID with voting statistics and user vote if authenticated
        operationId: getProposal
        parameters:
          - name: proposalId
            in: path
            required: true
            description: The ID of the proposal to retrieve
            schema:
              type: string
        responses:
          '200':
            description: The proposal object with additional voting statistics
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/Proposal'
                    - type: object
                      properties:
                        voterVote:
                          oneOf:
                            - type: array
                              items:
                                oneOf:
                                  - type: number
                                  - type: string
                                    enum: [abstain]
                            - type: null
                          nullable: true
                          description: Array of vote option IDs the authenticated voter selected (or null if not voted)
                        ballotStatus:
                          type: string
                        results:
                          type: object
                          nullable: true
                        totalVotes:
                          type: number
                        totalVoterCount:
                          type: number
                        totalVotingPower:
                          type: number
          '400':
            $ref: '#/components/responses/BadRequest'
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/ServerError'
      /comments:
        get:
          tags:
            - Proposals
          summary: Get comments for a proposal
          description: Get all comments for a specific proposal sorted by creation date
          operationId: getProposalComments
          parameters:
            - name: proposalId
              in: path
              required: true
              description: The ID of the proposal
              schema:
                type: string
          responses:
            '200':
              description: List of comments for the proposal
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'
      /results:
        get:
          tags:
            - Proposals
          summary: Get voting results for a proposal
          description: Get voting results for a specific proposal with vote counts and voting power
          operationId: getProposalResults
          parameters:
            - name: proposalId
              in: path
              required: true
              description: The ID of the proposal
              schema:
                type: string
          responses:
            '200':
              description: The proposal object with voting results
              content:
                application/json:
                  schema:
                    allOf:
                      - $ref: '#/components/schemas/Proposal'
                      - type: object
                        properties:
                          results:
                            type: array
                            items:
                              type: object
                              properties:
                                value:
                                  type: number
                                  description: Vote option value/id
                                label:
                                  type: string
                                  description: Vote option label
                                count:
                                  type: number
                                  description: Number of votes for this option
                                votingPower:
                                  type: number
                                  description: Total voting power for this option
                          totalVotes:
                            type: number
                            description: Total number of votes cast
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'
      /short:
        get:
          tags:
            - Proposals
          summary: Get a shortened version of a proposal
          description: Get a shortened version of a proposal without detailed data
          operationId: getProposalShort
          parameters:
            - name: proposalId
              in: path
              required: true
              description: The ID of the proposal to retrieve
              schema:
                type: string
          responses:
            '200':
              description: The proposal object without detailed data
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Proposal'
            '404':
              $ref: '#/components/responses/NotFound'
            '500':
              $ref: '#/components/responses/ServerError'

  /vote:
    /{proposalId}:
      post:
        tags:
          - Votes
        summary: Submit or update a vote
        description: Submit or update a vote on a specific proposal
        operationId: submitVote
        security:
          - cookieAuth: []
          - bearerAuth: []
        parameters:
          - name: proposalId
            in: path
            required: true
            description: ID of the proposal to vote on
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - vote
                properties:
                  vote:
                    type: array
                    items:
                      oneOf:
                        - type: number
                        - type: string
                          enum: [abstain]
                    description: Array of vote option IDs (numbers) or "abstain" string
                    minItems: 1
        responses:
          '200':
            description: The saved vote object with indication if vote was changed
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/Vote'
                    - type: object
                      properties:
                        changes:
                          type: boolean
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '403':
            $ref: '#/components/responses/Forbidden'
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/ServerError'

  /comment:
    post:
      tags:
        - Comments
      summary: Create a comment
      description: Creates a new comment on a specific proposal
      operationId: createComment
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - proposalId
                - comment
              properties:
                proposalId:
                  type: string
                  description: ID of the proposal to comment on
                comment:
                  type: string
                  description: Comment content (max 1000 characters)
                  maxLength: 1000
      responses:
        '200':
          description: The saved comment object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /session:
    get:
      tags:
        - Session
      summary: Validate session
      description: Validate JWT token and return voter ID
      operationId: getSession
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: The voter ID if token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  voterId:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Session
      summary: Request authentication nonce
      description: Request authentication nonce for standard (non-script) wallet
      operationId: requestNonce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signerAddress
                - signType
              properties:
                signerAddress:
                  type: string
                  description: The address of the signer
                signType:
                  type: string
                  description: Type of signature (e.g., 'drep')
      responses:
        '200':
          description: Nonce to sign and voter identification data
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataHex:
                    type: string
                    description: Nonce to sign (hex encoded)
                  voterId:
                    type: string
                  voterIdHex:
                    type: string
                  signerAddressHex:
                    type: string
                  calidusID:
                    type: string
                    nullable: true
                    description: Calidus ID for pool signers (only present for pool signType)
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags:
        - Session
      summary: Verify signature and login
      description: Verify signature of nonce and issue JWT token for authentication
      operationId: verifySignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signerAddress
                - signType
                - signature
              properties:
                signerAddress:
                  type: string
                signType:
                  type: string
                signature:
                  $ref: '#/components/schemas/Signature'
      responses:
        '200':
          description: JWT token and expiration information
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresIn:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags:
        - Session
      summary: Logout
      description: Logout by clearing authentication cookie
      operationId: logout
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Success message confirming logout
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
    /multisig:
      post:
        tags:
          - Session
        summary: Request authentication nonce for multisig
        description: Request authentication nonce for multisig wallet
        operationId: requestMultisigNonce
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - signerAddress
                  - signType
                  - scriptAddress
                properties:
                  signerAddress:
                    type: string
                  signType:
                    type: string
                  scriptAddress:
                    type: string
                    description: The address of the multisig script
        responses:
          '200':
            description: Nonce to sign and identification data including script address
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    dataHex:
                      type: string
                      description: Nonce to sign (hex encoded)
                    voterId:
                      type: string
                    voterIdHex:
                      type: string
                    signerAddressHex:
                      type: string
                    scriptAddress:
                      type: string
                      description: The CIP129 multisig script address
          '400':
            $ref: '#/components/responses/BadRequest'
          '403':
            $ref: '#/components/responses/Forbidden'
      put:
        tags:
          - Session
        summary: Verify multisig signature and login
        description: Verify signature and script membership for multisig wallet, issue JWT token
        operationId: verifyMultisigSignature
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - signerAddress
                  - signType
                  - scriptAddress
                  - signature
                properties:
                  signerAddress:
                    type: string
                  signType:
                    type: string
                  scriptAddress:
                    type: string
                  signature:
                    $ref: '#/components/schemas/Signature'
        responses:
          '200':
            description: JWT token and expiration information
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    token:
                      type: string
                    expiresIn:
                      type: string
                      format: date-time
          '400':
            $ref: '#/components/responses/BadRequest'

  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Get dashboard information
      description: Get authenticated voter stats including last login time and pending votes count
      operationId: getDashboard
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Voter information including voter ID, last login timestamp, and pending votes count
          content:
            application/json:
              schema:
                type: object
                properties:
                  voterId:
                    type: string
                  lastLogin:
                    type: string
                    format: date-time
                    nullable: true
                  multiSig:
                    type: boolean
                    description: Whether the voter is using multisig authentication
                  pendingVotesCount:
                    type: number
                    description: Number of pending (unsubmitted) votes for the voter
        '401':
          $ref: '#/components/responses/Unauthorized'
    /ballots:
      get:
        tags:
          - Dashboard
        summary: Get ballots for voter
        description: Get all ballots the authenticated voter can vote on or has already voted on
        operationId: getDashboardBallots
        security:
          - cookieAuth: []
          - bearerAuth: []
        responses:
          '200':
            description: List of ballots with voter-specific information (voting power)
            content:
              application/json:
                schema:
                  type: array
                  items:
                    allOf:
                      - $ref: '#/components/schemas/Ballot'
                      - type: object
                        properties:
                          votingPower:
                            type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
    /pending:
      get:
        tags:
          - Dashboard
        summary: Get pending votes
        description: Get all pending votes for the authenticated voter
        operationId: getPendingVotes
        security:
          - cookieAuth: []
          - bearerAuth: []
        responses:
          '200':
            description: List of pending votes or message if no pending votes exist
            content:
              application/json:
                schema:
                  oneOf:
                    - type: object
                      properties:
                        message:
                          type: string
                          example: no pending votes
                    - type: array
                      items:
                        $ref: '#/components/schemas/Vote'
        '401':
          $ref: '#/components/responses/Unauthorized'
      /{ballotId}/checkout:
        post:
          tags:
            - Dashboard
          summary: Request checkout for a ballot
          description: Request checkout for a ballot, creating transaction data for signing
          operationId: requestCheckout
          security:
            - cookieAuth: []
            - bearerAuth: []
          parameters:
            - name: ballotId
              in: path
              required: true
              description: ID of the ballot to checkout
              schema:
                type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - signerAddress
                  - signType
                properties:
                  signerAddress:
                    type: string
                    description: Address of the signer
                  signType:
                    type: string
                    description: Type of signature (e.g., 'drep')
        responses:
          '200':
            description: Transaction data for signing
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TransactionResponse'
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '404':
            $ref: '#/components/responses/NotFound'
        put:
          tags:
            - Dashboard
          summary: Submit signed transaction
          description: Submit a signed transaction to finalize votes for a ballot
          operationId: submitTransaction
          security:
            - cookieAuth: []
            - bearerAuth: []
          parameters:
            - name: ballotId
              in: path
              required: true
              description: ID of the ballot
              schema:
                type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - signerAddress
                  - signType
                  - data
                  - signature
                properties:
                  signerAddress:
                    type: string
                  signType:
                    type: string
                  data:
                    type: string
                    description: Merkle root of the transaction data
                  signature:
                    $ref: '#/components/schemas/Signature'
        responses:
          '200':
            description: Confirmation of submitted votes with transaction ID
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: ok
                    message:
                      type: string
                      example: Votes submitted
                    transaction:
                      type: string
          '400':
            $ref: '#/components/responses/BadRequest'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '404':
            $ref: '#/components/responses/NotFound'
        /multisig:
          post:
            tags:
              - Dashboard
            summary: Request checkout for multisig
            description: Request checkout for a ballot using multisig, creating or retrieving transaction data
            operationId: requestMultisigCheckout
            security:
              - cookieAuth: []
              - bearerAuth: []
            parameters:
              - name: ballotId
                in: path
                required: true
                description: ID of the ballot to checkout
                schema:
                  type: string
              - name: transactionId
                in: path
                required: false
                description: Optional ID of an existing pending transaction to retrieve
                schema:
                  type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - scriptAddress
                    - signerAddress
                    - signType
                  properties:
                    scriptAddress:
                      type: string
                      description: Address of the multisig script
                    signerAddress:
                      type: string
                    signType:
                      type: string
          responses:
            '200':
              description: Transaction data for signing
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/TransactionResponse'
            '400':
              $ref: '#/components/responses/BadRequest'
            '401':
              $ref: '#/components/responses/Unauthorized'
            '404':
              $ref: '#/components/responses/NotFound'
          put:
            tags:
              - Dashboard
            summary: Submit multisig signature
            description: Submit a signature for a multisig transaction, finalizing votes if all required signatures are present
            operationId: submitMultisigSignature
            security:
              - cookieAuth: []
              - bearerAuth: []
            parameters:
              - name: ballotId
                in: path
                required: true
                description: ID of the ballot
                schema:
                  type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - signerAddress
                    - signType
                    - scriptAddress
                    - data
                    - signature
                  properties:
                    signerAddress:
                      type: string
                    signType:
                      type: string
                    scriptAddress:
                      type: string
                    data:
                      type: string
                      description: Merkle root of the transaction data
                    signature:
                      $ref: '#/components/schemas/Signature'
          responses:
            '200':
              description: Confirmation of submitted signature or finalized votes
              content:
                application/json:
                  schema:
                    oneOf:
                      - type: object
                        properties:
                          status:
                            type: string
                            example: info
                          message:
                            type: string
                            example: MultiSig not complete yet
                      - type: object
                        properties:
                          status:
                            type: string
                            example: ok
                          message:
                            type: string
                            example: Votes submitted
                          transaction:
                            type: string
            '400':
              $ref: '#/components/responses/BadRequest'
            '401':
              $ref: '#/components/responses/Unauthorized'
            '403':
              $ref: '#/components/responses/Forbidden'
            '404':
              $ref: '#/components/responses/NotFound'

  /transactions:
    get:
      tags:
        - Transactions
      summary: Get all transactions
      description: Get all transactions for the authenticated user
      operationId: getTransactions
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: List of transactions for the user sorted by update time (descending)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
    /{transactionId}:
      get:
        tags:
          - Transactions
        summary: Get a specific transaction
        description: Get a specific transaction by ID for the authenticated user
        operationId: getTransaction
        security:
          - cookieAuth: []
          - bearerAuth: []
        parameters:
          - name: transactionId
            in: path
            required: true
            description: ID of the transaction to retrieve
            schema:
              type: string
        responses:
          '200':
            description: The requested transaction object
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Transaction'
          '401':
            $ref: '#/components/responses/Unauthorized'
          '404':
            $ref: '#/components/responses/NotFound'

  /voters:
    get:
      tags:
        - Voters
      summary: Get paginated list of voters
      description: Get a paginated list of voters with filtering, sorting, and search capabilities
      operationId: getVoters
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page (max 100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: search
          in: query
          description: Search term for voter ID
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field
          required: false
          schema:
            type: string
            enum: [voterId, votes, lastLogin]
            default: votes
        - name: direction
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of voters with pagination metadata
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        example: msg
                      message:
                        type: string
                        example: No voters found
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            voterId:
                              type: string
                            votes:
                              type: number
                              description: Number of votes cast by this voter
                            lastLogin:
                              type: string
                              format: date-time
                              nullable: true
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
    /types:
      get:
        tags:
          - Voters
        summary: Get voter type counts
        description: Get counts of different voter types (stake, drep, pool)
        operationId: getVoterTypes
        responses:
          '200':
            description: Array of objects with voter type and count
            content:
              application/json:
                schema:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [stake, drep, pool]
                      count:
                        type: number
          '500':
            $ref: '#/components/responses/ServerError'
    /{voterId}:
      get:
        tags:
          - Voters
        summary: Get voter details
        description: Get detailed information about a specific voter including voting history
        operationId: getVoter
        parameters:
          - name: voterId
            in: path
            required: true
            description: The ID of the voter to retrieve
            schema:
              type: string
        responses:
          '200':
            description: The voter object with voting history and statistics
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    voterType:
                      type: string
                      enum: [stake, drep, pool]
                    voterId:
                      type: string
                    votes:
                      type: array
                      items:
                        type: object
                        properties:
                          _id:
                            type: string
                          title:
                            type: string
                          votePeriodStart:
                            type: string
                            format: date-time
                          votePeriodEnd:
                            type: string
                            format: date-time
                          votingPower:
                            type: number
                          status:
                            type: string
                          proposals:
                            type: array
                            items:
                              type: object
                              properties:
                                proposalId:
                                  type: string
                                title:
                                  type: string
                                vote:
                                  type: array
                                  items:
                                    type: string
                    ballotsVoted:
                      type: number
                      description: Number of ballots the voter has voted on
                    proposalsVoted:
                      type: number
                      description: Total number of proposals the voter has voted on across all ballots
                    lastVoteDate:
                      type: string
                      format: date-time
                      nullable: true
                      description: Date of the most recent vote
                    lastLogin:
                      type: string
                      format: date-time
                      nullable: true
                      description: Last login timestamp
          '400':
            $ref: '#/components/responses/BadRequest'
          '404':
            $ref: '#/components/responses/NotFound'
          '500':
            $ref: '#/components/responses/ServerError'

  /faqs:
    get:
      tags:
        - FAQs
      summary: Get all live FAQs
      description: Get all live FAQs with search and filtering capabilities. Only FAQs with is_live set to true are returned.
      operationId: getFAQs
      parameters:
        - name: search
          in: query
          description: Search term for FAQ title or content
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: tags
          in: query
          description: Filter by tags (comma-separated, e.g., 'voter,proposer')
          required: false
          schema:
            type: string
            example: voter,proposer
        - name: featured
          in: query
          description: Filter by featured status (true or false)
          required: false
          schema:
            type: string
            enum: [true, false]
      responses:
        '200':
          description: List of live FAQs matching the search and filter criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FAQ'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    StatusResponse:
      type: object
      description: |
        Comprehensive system status information including server health, database connection status,
        network information, and runtime metrics. Used by monitoring tools and system administrators
        to assess the operational state of the API server.
      properties:
        status:
          type: string
          description: Overall system status (e.g., "operational", "degraded", "down")
          example: operational
        message:
          type: string
          description: Human-readable status message describing the current system state
          example: System is operational
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the status was generated
        environment:
          type: string
          description: Current deployment environment (e.g., "development", "production")
        network:
          type: string
          description: Name of the blockchain network (e.g., "mainnet", "preprod", "preview")
        networkId:
          type: integer
          description: Numeric identifier for the blockchain network
        server:
          type: object
          description: Server runtime information and metrics
          properties:
            uptime:
              type: string
              description: Human-readable server uptime (e.g., "5d 12h 30m 15s")
            uptimeSeconds:
              type: number
              description: Server uptime in seconds since last restart
            version:
              type: string
              description: Version of the API server application
            nodeVersion:
              type: string
              description: Version of Node.js runtime
            memoryUsage:
              type: object
              description: Current memory usage statistics
              properties:
                rss:
                  type: string
                  description: Resident Set Size - total memory allocated for the process
                heapTotal:
                  type: string
                  description: Total size of allocated heap memory
                heapUsed:
                  type: string
                  description: Amount of heap memory currently in use
        frontend:
          type: string
          description: Version of the frontend application (if available)
        database:
          type: object
          description: Database connection status and health information
          properties:
            status:
              type: string
              enum: [connected, disconnected]
              description: Current database connection state
            message:
              type: string
              description: Human-readable message about database connection status

    Ballot:
      type: object
      description: |
        Represents a registered ballot in the voting system. A ballot defines a voting period,
        eligible voter types, and contains multiple proposals that voters can vote on. Ballots
        can be in "upcoming", "live", or "closed" status based on the current time relative
        to votePeriodStart and votePeriodEnd dates.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the ballot
        title:
          type: string
          description: Title of the ballot
        description:
          type: string
          description: Detailed description of what the ballot is about
        ipfsHash:
          type: string
          nullable: true
          description: IPFS hash of the ballot metadata (optional, for decentralized storage)
        voterType:
          type: string
          description: Type of voters eligible for this ballot (e.g., 'stake', 'drep', 'pool')
        voterDescription:
          type: string
          description: Human-readable description of who is eligible to vote in this ballot
        votePeriodStart:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the voting period begins
        votePeriodEnd:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the voting period ends
        voteFilters:
          type: boolean
          description: Whether filtering options (tags, categories) are enabled for proposals in this ballot
        voteWeighted:
          type: boolean
          description: Whether votes in this ballot are weighted by voting power (true) or counted equally (false)
        proposalPeriodStart:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the proposal submission period begins
        proposalPeriodEnd:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the proposal submission period ends
        resultTxHash:
          type: string
          nullable: true
          description: Blockchain transaction hash where final results were recorded (null if not yet finalized)
        status:
          type: string
          enum: [live, closed, upcoming]
          description: |
            Current status of the ballot:
            - "upcoming": Voting period has not started yet
            - "live": Voting period is currently active
            - "closed": Voting period has ended
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the ballot was created
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the ballot was last updated

    Proposal:
      type: object
      description: |
        Represents a registered proposal within a ballot. Proposals are items that voters can vote on.
        Each proposal belongs to a specific ballot and contains details about what's being voted on,
        along with configurable voting options. Proposals support multiple vote types including
        default (Yes/No), budget (with cost constraints), ranked, scale (numeric range), and preference voting.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the proposal
        ballotId:
          type: string
          description: ID of the ballot this proposal belongs to
        ipfsHash:
          type: string
          nullable: true
          description: IPFS hash of the proposal metadata (optional, for decentralized storage)
        title:
          type: string
          description: Title of the proposal
        description:
          type: string
          description: Detailed description of the proposal content
        categories:
          type: array
          items:
            type: string
          description: Array of category labels for organizing proposals (e.g., ["Governance", "Treasury"])
        tags:
          type: array
          items:
            type: string
          description: Array of tag labels for filtering and searching proposals
        data:
          type: object
          nullable: true
          description: Additional structured data related to the proposal (format varies by proposal type)
        voteType:
          type: string
          enum: [default, budget, ranked, scale, preference]
          description: |
            Type of voting system for this proposal:
            - "default": Standard voting with predefined options (Yes/No/Abstain)
            - "budget": Voting with cost constraints where voters have a budget to allocate
            - "ranked": Voters rank options in order of preference
            - "scale": Numeric scale voting (e.g., 1-10) with configurable increment
            - "preference": Voters express preferences among multiple options
        voteIncrement:
          type: number
          description: Increment value for scale votes (e.g., 1 for integer scale, 0.5 for half-point scale)
        voterBudget:
          type: number
          description: Budget limit for voters in budget vote type (total cost of selected options cannot exceed this)
        abstainAllowed:
          type: boolean
          description: Whether voters can select an "abstain" option (if true, abstain cannot be combined with other votes)
        voteOptions:
          type: array
          items:
            type: object
            properties:
              id:
                oneOf:
                  - type: number
                  - type: string
                    enum: [abstain]
                description: Vote option ID (number) or "abstain" string
              cost:
                type: number
                description: Cost of selecting this option (used in budget vote type, defaults to 1)
              label:
                type: string
                description: Display label for this vote option (e.g., "Yes", "No", "Strongly Agree")
          description: Array of available voting options for this proposal
        commentCount:
          type: number
          description: Number of comments posted on this proposal (computed field)
        voteCount:
          type: number
          description: Number of unique voters who have submitted votes on this proposal (computed field)
        votingPower:
          type: number
          description: Total voting power of all votes cast on this proposal (computed field, only in weighted ballots)
        result:
          type: object
          nullable: true
          description: Calculated voting results object (structure varies by voteType, null if results not yet calculated)
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the proposal was last updated (or when results were last calculated)
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the proposal was created

    Vote:
      type: object
      description: |
        Represents a vote cast by a voter for a specific proposal within a ballot. Votes can exist
        in two states: pending (not yet submitted) and submitted. When votes are submitted via
        transaction, the submittedVote and submittedAt fields are updated. If a voter changes their
        vote before submission, only the vote field changes. Each voter can only have one vote per proposal.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the vote record
        voterId:
          type: string
          description: ID of the voter who cast the vote (references Voter, format depends on voterType)
        ballotId:
          type: string
          description: ID of the ballot this vote belongs to
        proposalId:
          type: string
          description: ID of the proposal being voted on
        vote:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
                enum: [abstain]
          description: |
            Current value of the vote (may differ from submittedVote if changed after initial submission).
            Array of vote option IDs (numbers) or "abstain" string. For scale votes, contains the numeric value.
            For budget votes, contains multiple option IDs that fit within the voter's budget.
        submittedVote:
          type: array
          items:
            oneOf:
              - type: number
              - type: string
                enum: [abstain]
          nullable: true
          description: |
            Value of the vote when it was last submitted via transaction. This is the vote that counts
            toward results. Null if the vote has never been submitted. Array of vote option IDs that
            were submitted (numbers) or "abstain" string.
        submittedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the vote was last submitted via transaction (null if never submitted)
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the vote was first created
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the vote was last updated (changes when vote value is modified)

    Comment:
      type: object
      description: |
        Represents a comment made by a voter on a proposal. Comments allow voters to provide feedback,
        ask questions, or discuss proposals. Comments are public and visible to all users viewing the proposal.
        Each comment is associated with a specific proposal and the voter who created it.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the comment
        proposalId:
          type: string
          description: ID of the proposal this comment belongs to
        voterId:
          type: string
          description: ID of the voter who made the comment
        content:
          type: string
          description: The content of the comment (max 1000 characters, sanitized for security)
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the comment was created
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the comment was last updated

    FAQ:
      type: object
      description: |
        Represents a frequently asked question in the voting system. FAQs help users understand
        how to use the platform, voting procedures, and common questions. Only FAQs with is_live=true
        are returned by the API. FAQs can be tagged for filtering and can be marked as featured
        to appear prominently on the homepage.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the FAQ
        title:
          type: string
          description: Title/question text of the FAQ
        content:
          type: string
          description: Answer content of the FAQ (supports markdown formatting)
        tags:
          type: array
          items:
            type: string
          description: Tags for categorizing the FAQ (e.g., ["voter", "proposer", "technical"])
          example: [voter]

    Transaction:
      type: object
      description: |
        Represents a transaction for submitting votes in the voting system. Transactions batch multiple
        votes together for efficient blockchain submission. Transactions track the state of vote submissions
        from initial creation through signature verification to final submission. Transactions may require
        single signatures or multiple signatures (via the multiSig array) depending on the voter type.
        The merkleRoot provides cryptographic integrity verification for all votes in the transaction.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the transaction
        voterId:
          type: string
          description: ID of the voter associated with this transaction
        ballotId:
          type: string
          description: ID of the ballot this transaction belongs to
        merkleRoot:
          type: string
          description: |
            Merkle root hash of all votes in this transaction. Used for cryptographic verification
            of vote integrity. This is the data that must be signed by the voter.
        votes:
          type: object
          description: |
            Collection of votes associated with this transaction. Keys are proposal IDs, values contain
            the vote data for each proposal. Structure: { [proposalId]: { proposalId: string, vote: number[] } }
          additionalProperties:
            type: object
            properties:
              proposalId:
                type: string
                description: ID of the proposal being voted on
              vote:
                type: array
                items:
                  oneOf:
                    - type: number
                    - type: string
                      enum: [abstain]
                description: Array of vote option IDs (numbers) or "abstain" string for this proposal
        txHash:
          type: string
          nullable: true
          description: Blockchain transaction hash after successful submission (null if not yet submitted to blockchain)
        status:
          type: string
          enum: [created, pending, submitted]
          description: |
            Current status of the transaction:
            - "created": Transaction created but not yet signed
            - "pending": Transaction signed but multisig incomplete (for multisig transactions)
            - "submitted": Transaction fully signed and votes have been submitted
        signature:
          $ref: '#/components/schemas/Signature'
          nullable: true
          description: Signature object for single-signature transactions (null for multisig transactions)
        multiSig:
          type: array
          items:
            $ref: '#/components/schemas/Signature'
          description: Array of signatures for multisig transactions (empty for single-signature transactions)
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the transaction was created
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the transaction was last updated

    TransactionResponse:
      type: object
      description: |
        Response object returned when requesting checkout for a ballot. Contains the transaction data
        that needs to be signed by the voter, along with hex-encoded values for signing operations.
        This is used in the checkout flow where voters sign their votes before final submission.
      properties:
        _id:
          type: string
          description: Unique MongoDB ObjectId for the transaction
        voterId:
          type: string
          description: ID of the voter associated with this transaction
        ballotId:
          type: string
          description: ID of the ballot this transaction belongs to
        merkleRoot:
          type: string
          description: Merkle root hash of all votes in this transaction
        votes:
          type: object
          description: Collection of votes associated with this transaction (same structure as Transaction.votes)
        dataHex:
          type: string
          description: Hex-encoded merkle root for signing (this is what the voter signs)
        voterIdHex:
          type: string
          description: Hex-encoded voter ID (used for signature verification)
        calidusID:
          type: string
          nullable: true
          description: Calidus ID for pool signers (only present when signType is "pool")

    Signature:
      type: object
      description: |
        Signature object structure for verifying voter identity and vote integrity. The structure
        varies by signature type (drep, stake, pool) and includes cryptographic proof that the voter
        signed the transaction data. For multisig transactions, multiple signature objects are stored
        in an array until all required signatures are collected.
      additionalProperties: true

    Pagination:
      type: object
      description: |
        Pagination metadata included in paginated API responses. Provides information about the
        total number of items, current page, items per page, and total number of pages available.
      properties:
        total:
          type: integer
          description: Total number of items matching the query (across all pages)
        page:
          type: integer
          description: Current page number (1-indexed)
        limit:
          type: integer
          description: Number of items per page (maximum 100)
        totalPages:
          type: integer
          description: Total number of pages available (calculated as ceil(total / limit))

  responses:
    BadRequest:
      description: Bad request - invalid parameters or data
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              message:
                type: string

    Unauthorized:
      description: Unauthorized - authentication required or invalid token
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              message:
                type: string
                example: Unauthorized

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              message:
                type: string

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              message:
                type: string

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: error
              message:
                type: string
