openapi: 3.0.3
info:
  title: Ekklesia Voting Backend API — v1
  description: |
    Hydra-backed live surface for the Ekklesia voting platform. v1 is paired
    with the v0 archival surface (see `openapi.yaml`) — the two coexist.

    ## What lives here

    - **Unified ballot listing** across legacy + Hydra sources.
    - **Broker endpoints** for Hydra votes: draft the signing payload,
      collect signatures (key-based or m-of-n multisig), submit to Hydra,
      surface confirmation artifacts.
    - **Admin lifecycle**: `/prepare`, `/start`, `/close`, `/finalize`,
      `/settle`, `/head-info` — role-gated.
    - **Public integrator surface** under `/public/*` — API-key gated,
      rate-limited, read-only.

    ## Authentication

    - `verifyToken` (JWT cookie or Authorization header) for voter session
      endpoints.
    - Same JWT + admin allowlist/claim for `/admin/*`.
    - API key (Bearer or x-api-key) for `/public/*`.
  version: 1.0.0
  contact:
    name: Adam Dean, Mad Orkestra
    license: ISC

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://docs.ekklesia.vote/api
    description: Documentation reference host

tags:
  - name: Unified Ballots
    description: Cross-source ballot listing and detail
  - name: Results
    description: Anonymous-readable provisional + final tallies (polled)
  - name: Votes (v1)
    description: Broker pipeline — draft, signature, submission
  - name: Admin
    description: Hydra ballot lifecycle (admin only)
  - name: Public
    description: Integrator read-only endpoints (API-key gated)
  - name: Health
    description: Liveness probe

paths:
  /health:
    get:
      tags: [Health]
      summary: v1 version + liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: "v1" }
                  status:  { type: string, example: "ok" }
                  timestamp: { type: string, format: date-time }

  /config:
    get:
      tags: [Health]
      summary: Deployment runtime config (explorer + IPFS gateway + network)
      description: |
        Public, unauthenticated. Frontends and third-party integrators read
        this to render cexplorer / IPFS links without hardcoding a network.
        Values come from `IPFS_GATEWAY_BASE`, `EXPLORER_TX_BASE`,
        `EXPLORER_ADDRESS_BASE`, `CARDANO_NETWORK` env vars (with safe
        defaults).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ipfsGatewayBase, explorerTxBase, explorerAddressBase, network]
                properties:
                  ipfsGatewayBase:
                    type: string
                    example: "https://ipfs.io/ipfs/"
                  explorerTxBase:
                    type: string
                    example: "https://cexplorer.io/tx/"
                  explorerAddressBase:
                    type: string
                    example: "https://cexplorer.io/address/"
                  network:
                    type: string
                    enum: [preprod, preview, mainnet]
                    example: "preprod"

  /ballots:
    get:
      tags: [Unified Ballots]
      summary: List ballots across all sources
      description: |
        `Cache-Control: public, max-age=60`. Ballot definitions are largely
        static once published; poll **/results** separately for live tallies.
      parameters:
        - in: query
          name: voterType
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [upcoming, live, closed] }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
        - in: query
          name: source
          description: Restrict to a single adapter (`legacy` or `hydra`).
          schema: { type: string, enum: [legacy, hydra] }
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/UnifiedBallot" }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  /ballots/{id}:
    get:
      tags: [Unified Ballots]
      summary: Ballot detail (enriched from Hydra when source === "hydra")
      description: |
        Cache-Control varies by status: `closed` → `max-age=3600`, `live` →
        `max-age=120`, `upcoming` → `max-age=30`. Results are **not** embedded —
        call `/results/ballot/{id}` separately.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ballot
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/UnifiedBallot" }
        "404": { description: Not found }

  /results/ballot/{ballotId}:
    get:
      tags: [Results]
      summary: All Result rows for a ballot — anonymous, short-cached
      description: |
        Served with `Cache-Control: public, max-age=30` so clients can poll
        cheaply while the cron updates provisional tallies every ~10 min.
        Final tallies land the moment `/admin/ballots/{id}/finalize` completes.
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Array of Result rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Result" }

  /results/proposal/{proposalId}:
    get:
      tags: [Results]
      summary: Single proposal result — anonymous, short-cached
      parameters:
        - in: path
          name: proposalId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Result" }
        "404": { description: No results yet }

  /votes/{ballotId}/draft:
    post:
      tags: [Votes (v1)]
      summary: Create a draft vote package; reserves a nonce and returns the canonical signing payload
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [votes]
              properties:
                votes:
                  type: array
                  items: { $ref: "#/components/schemas/VoteSelection" }
                responderRole: { type: string }
                nativeScript:
                  description: For multisig DReps — the native-script definition.
                  type: object
                calidusDeclaration:
                  description: For CIP-151 pool hot-key votes.
                  type: object
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DraftResponse" }
        "403": { description: Voter is not eligible }

  /votes/{ballotId}/signature:
    post:
      tags: [Votes (v1)]
      summary: Append a signature; submits to Hydra when threshold is met
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId, witness]
              properties:
                packageId: { type: string }
                witness: { $ref: "#/components/schemas/CoseWitness" }
      responses:
        "200":
          description: Signature appended (and possibly submitted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  submitted: { type: boolean }
                  package: { $ref: "#/components/schemas/VotePackage" }
                  multisig: { $ref: "#/components/schemas/MultisigStatus", nullable: true }
        "409": { description: Package in terminal state }
        "502": { description: Hydra submission failed }

  /votes/{ballotId}/mine:
    get:
      tags: [Votes (v1)]
      summary: Rehydrate voter's current state on this ballot
      description: |
        **CRITICAL SEMANTIC**: Hydra treats every submitted vote payload as the
        voter's COMPLETE final state — it does NOT merge with prior submissions.
        If a voter previously voted on Proposals 2/3/4 and now submits a payload
        containing only Proposal 5, the Hydra head erases the 2/3/4 votes.

        To amend or add votes, the frontend rehydrates from
        `confirmed.votes`, lets the user edit the selection set, then sends
        the COMPLETE ballot to `/draft`. Whatever's in the votes array IS the
        full final state — removing a prior vote is simply omitting it.
        The backend does not merge; the frontend owns the composition.

        `confirmed` is the latest hydra-confirmed package (the on-chain source
        of truth). `inFlight` lists packages still awaiting signatures,
        submission, or that failed — when one of these submits it REPLACES the
        confirmed state.
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Voter's per-ballot state
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  ballotId: { type: string }
                  confirmed:
                    nullable: true
                    description: |
                      Latest hydra-confirmed package. The rehydration source.
                      `votes` is { proposalId: selection }. Null if the voter
                      has never successfully submitted on this ballot.
                    type: object
                    properties:
                      packageId: { type: string }
                      nonce: { type: integer }
                      submittedAt: { type: string, format: date-time, nullable: true }
                      hydraTxId: { type: string, nullable: true }
                      votes:
                        type: object
                        additionalProperties: true
                  inFlight:
                    type: array
                    description: |
                      Packages not yet confirmed, newest first. Includes
                      awaiting-signatures (multisig), awaiting-submission,
                      draft, and failed.
                    items:
                      type: object
                      properties:
                        packageId: { type: string }
                        status: { type: string, enum: [draft, awaiting-signatures, awaiting-submission, failed] }
                        nonce: { type: integer }
                        createdAt: { type: string, format: date-time }
                        votes:
                          type: object
                          additionalProperties: true
                        multisig:
                          nullable: true
                          type: object
                          properties:
                            signaturesCollected: { type: integer }
                            signaturesNeeded: { type: integer }
                            satisfied: { type: boolean }
                  summary:
                    type: object
                    properties:
                      confirmed: { type: integer }
                      awaitingSignatures: { type: integer }
                      awaitingSubmission: { type: integer }
                      draft: { type: integer }
                      failed: { type: integer }
        "401": { description: Auth required }
        "404": { description: Ballot not found or not Hydra-backed }

  /votes/{ballotId}/submit:
    post:
      tags: [Votes (v1)]
      summary: Manual retry of submission for a package in awaiting-submission
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId]
              properties:
                packageId: { type: string }
      responses:
        "200":
          description: Submission state
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  package: { $ref: "#/components/schemas/VotePackage" }

  /votes/{ballotId}/package/{packageId}:
    get:
      tags: [Votes (v1)]
      summary: Current VotePackage state for the session voter
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
        - in: path
          name: packageId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Package
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  package: { $ref: "#/components/schemas/VotePackage" }

  /proposals/ballot/{ballotId}:
    get:
      tags: [Proposals]
      summary: List proposals for a ballot, with facet-driven sort + filter
      description: |
        Sort and filter keys must be declared on `Ballot.facets[]`.
        Multi-value enum filters take CSV (e.g. `?filter[category]=a,b`);
        OR semantics. Unknown keys and attempts to sort on a
        non-sortable facet return 400. Facets are frozen once the
        ballot goes live, so the filter UI can safely cache the
        facet list for the ballot's lifetime.
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
        - in: query
          name: sort
          description: Facet key to sort by. Must have `sortable: true`.
          schema: { type: string }
        - in: query
          name: dir
          schema: { type: string, enum: [asc, desc] }
        - in: query
          name: filter
          style: deepObject
          explode: true
          description: |
            Object of `filter[<facetKey>]=<csv>` filters. CSV split on
            `,`; OR within a single facet; AND across facets.
          schema:
            type: object
            additionalProperties: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated proposals
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  data: { type: array, items: { type: object } }
                  pagination:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      limit: { type: integer }
                  applied:
                    type: object
                    properties:
                      filters:
                        type: object
                        additionalProperties:
                          type: array
                          items: { type: string }
                      sort:
                        type: object
                        properties:
                          key: { type: string }
                          direction: { type: string, enum: [asc, desc] }
                          source: { type: string, enum: [default, fallback] }
        "400":
          description: Unknown facet key, unsortable sort target, or bad filter value
        "404": { description: Ballot not found }

  /admin/ballots/import:
    post:
      tags: [Admin, Ingestion]
      summary: Import a compiled ballot (push from proposals module or admin upload)
      description: |
        Accepts a `CompiledBallot` v1 payload under either:
          - **Admin JWT** (`cookieAuth`) — treated as `importMethod: "upload"`.
          - **API key** with scope `write:ballot-import` — treated as
            `importMethod: "push"`. Key-holders are typically proposals
            modules that transform their internal shape into CompiledBallot.

        Upsert key is `(source.moduleId, source.externalBallotId)`. The
        target ballot is **frozen once its status transitions to `live`
        or `closed`** — re-import attempts after that point return 409.

        Proposals are replaced wholesale on every import (delete-then-insert).
        The raw payload is archived to `ImportedBallotPayload` for audit.
      security:
        - cookieAuth: []
        - bearerAuth: []
        - apiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompiledBallot" }
      responses:
        "200":
          description: Existing ballot updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BallotImportResult" }
        "201":
          description: New ballot created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BallotImportResult" }
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "error" }
                  code: { type: string, example: "VALIDATION_FAILED" }
                  message: { type: string }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path: { type: string }
                        message: { type: string }
        "401": { description: Auth required (admin JWT or API key) }
        "403": { description: API key missing write:ballot-import scope }
        "409":
          description: Ballot is live/closed and cannot be re-imported

  /admin/ballots/{id}/prepare:
    post:
      tags: [Admin]
      summary: Call Hydra /prepare, stamp Hydra metadata on the Ballot
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint: { type: string, description: "Override the default Hydra endpoint for this ballot" }
                ballotCid: { type: string }
      responses:
        "200": { description: Success }
        "401": { description: Not authenticated }
        "403": { description: Admin privileges required }
        "502": { description: Hydra upstream error }

  /admin/ballots/{id}/start:
    post: { tags: [Admin], summary: Open the head, responses: { "200": { description: OK }}, security: [{ cookieAuth: [] }], parameters: [{ in: path, name: id, required: true, schema: { type: string }}] }

  /admin/ballots/{id}/close:
    post: { tags: [Admin], summary: Close the head, responses: { "200": { description: OK }}, security: [{ cookieAuth: [] }], parameters: [{ in: path, name: id, required: true, schema: { type: string }}] }

  /admin/ballots/{id}/finalize:
    post: { tags: [Admin], summary: Tally + update (601), writes final Result rows, responses: { "200": { description: OK }}, security: [{ cookieAuth: [] }], parameters: [{ in: path, name: id, required: true, schema: { type: string }}] }

  /admin/ballots/{id}/settle:
    post: { tags: [Admin], summary: Finalize + count + close in one call, responses: { "200": { description: OK }}, security: [{ cookieAuth: [] }], parameters: [{ in: path, name: id, required: true, schema: { type: string }}] }

  /admin/ballots/{id}/head-info:
    get: { tags: [Admin], summary: Hydra head-info passthrough, responses: { "200": { description: OK }}, security: [{ cookieAuth: [] }], parameters: [{ in: path, name: id, required: true, schema: { type: string }}] }

  /public/ballots:
    get:
      tags: [Public]
      summary: Public unified ballot listing (API-key gated, rate-limited)
      security: [{ apiKeyHeader: [] }, { bearerAuth: [] }]
      parameters:
        - in: query
          name: source
          schema: { type: string, enum: [legacy, hydra] }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/UnifiedBallot" }
                  pagination: { $ref: "#/components/schemas/Pagination" }
        "401": { description: Missing or invalid API key }
        "403": { description: Scope mismatch }
        "429": { description: Rate limit exceeded }

  /public/ballots/{id}:
    get:
      tags: [Public]
      summary: Public ballot detail
      security: [{ apiKeyHeader: [] }, { bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "404": { description: Not found }

  /public/results/ballot/{ballotId}:
    get:
      tags: [Public]
      summary: All Result rows for a ballot (provisional + final)
      security: [{ apiKeyHeader: [] }, { bearerAuth: [] }]
      parameters:
        - in: path
          name: ballotId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Array of results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Result" }

  /public/results/proposal/{proposalId}:
    get:
      tags: [Public]
      summary: Single proposal result
      security: [{ apiKeyHeader: [] }, { bearerAuth: [] }]
      parameters:
        - in: path
          name: proposalId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "404": { description: No results yet }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    UnifiedBallot:
      type: object
      properties:
        id: { type: string }
        source: { type: string, enum: [legacy, hydra] }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [upcoming, live, closed] }
        voterType: { type: string }
        voterGroups:
          type: array
          description: >
            Per-group eligibility + power-source declaration. Each entry
            pairs a role key (drep/pool/stake) with a Hydra
            RoleWeighting value (CredentialBased, StakeBased, or
            PledgeBased). Translated directly into Hydra's roleWeighting
            object at /prepare. Valid combinations:
            drep→CredentialBased|StakeBased;
            pool→CredentialBased|StakeBased|PledgeBased;
            stake→StakeBased.
          items:
            type: object
            required: [group, powerSource]
            properties:
              group: { type: string, enum: [drep, pool, stake] }
              powerSource: { type: string, enum: [CredentialBased, StakeBased, PledgeBased] }
        voterDescription: { type: string }
        voteWeighted: { type: boolean }
        votePeriodStart: { type: string, format: date-time }
        votePeriodEnd: { type: string, format: date-time }
        voteFilters: { type: boolean }
        ipfsHash: { type: string, nullable: true }
        proposalCount: { type: integer, nullable: true }
        singleProposal: { type: string, nullable: true }
        hydra:
          type: object
          nullable: true
          properties:
            endpoint: { type: string, nullable: true }
            headId: { type: string, nullable: true }
            ballotCid: { type: string, nullable: true }
            instancePolicyId: { type: string, nullable: true }
            headInfo: { type: object, nullable: true }
            ballot: { type: object, nullable: true }
        provisionalResultsEnabled: { type: boolean }
        proposalSource:
          nullable: true
          description: |
            Present when the ballot was imported from an upstream
            proposals module. Null for scaffold-created or legacy
            ballots.
          type: object
          properties:
            moduleId: { type: string }
            moduleUrl: { type: string, nullable: true }
            externalBallotId: { type: string }
            version: { type: string, nullable: true }
            importedAt: { type: string, format: date-time }
            importMethod: { type: string, enum: [push, upload] }
            importedBy: { type: string }
        facets:
          type: array
          description: Sort/filter dimensions declared for this ballot.
          items: { $ref: "#/components/schemas/FacetDefinition" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BallotImportResult:
      type: object
      required: [status, ballotId, created, proposalsImported, schemaVersion]
      properties:
        status: { type: string, example: "success" }
        ballotId: { type: string }
        created:
          type: boolean
          description: true on first import; false on subsequent updates
        proposalsImported: { type: integer }
        schemaVersion: { type: string, example: "1" }

    CompiledBallot:
      type: object
      description: |
        Canonical import payload. Produced by a proposals module's
        transform layer or hand-written as a JSON file uploaded by an
        admin. See `helper/compiledBallot/schema.js` for the
        authoritative shape + length caps.
      required: [schemaVersion, source, ballot, proposals]
      properties:
        schemaVersion:
          type: string
          enum: ["1"]
        source:
          type: object
          required: [moduleId, externalBallotId]
          properties:
            moduleId: { type: string, example: "catalyst-v2" }
            moduleUrl: { type: string, nullable: true }
            externalBallotId: { type: string, example: "fund-11" }
            version: { type: string, nullable: true }
        ballot:
          type: object
          required:
            - title
            - description
            - voterType
            - voterDescription
            - voteWeighted
            - voteFilters
            - votePeriodStart
            - votePeriodEnd
            - proposalPeriodStart
            - proposalPeriodEnd
            - voteAuthorityId
            - voteAuthorityAddress
          properties:
            title: { type: string, maxLength: 200 }
            description: { type: string, maxLength: 2000 }
            voterType:
              type: string
              enum: [stake, drep, pool, any]
              description: Human-readable label. Authoritative role + power-source declaration lives in `voterGroups`.
            voterGroups:
              type: array
              description: >
                Per-group eligibility + power-source declaration,
                translated directly into Hydra's `roleWeighting`.
                Valid combinations:
                drep→CredentialBased|StakeBased;
                pool→CredentialBased|StakeBased|PledgeBased;
                stake→StakeBased.
              items:
                type: object
                required: [group, powerSource]
                properties:
                  group: { type: string, enum: [drep, pool, stake] }
                  powerSource: { type: string, enum: [CredentialBased, StakeBased, PledgeBased] }
            voterDescription: { type: string }
            voteWeighted: { type: boolean }
            voteFilters: { type: boolean }
            votePeriodStart: { type: string, format: date-time }
            votePeriodEnd: { type: string, format: date-time }
            proposalPeriodStart: { type: string, format: date-time }
            proposalPeriodEnd: { type: string, format: date-time }
            voteAuthorityId: { type: string }
            voteAuthorityAddress: { type: string }
            ipfsHash: { type: string, nullable: true }
            voterValidationScript: { type: string }
            rollupScript: { type: string }
            startupScript: { type: string }
        facets:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/FacetDefinition" }
        proposals:
          type: array
          minItems: 1
          maxItems: 500
          items: { $ref: "#/components/schemas/CompiledProposal" }

    FacetDefinition:
      type: object
      required: [key, label, type]
      description: |
        Declares a sort/filter dimension for this ballot's proposals.
        Frozen at `status === "live"`. CSV is the wire format for
        multi-value enums (option names must not contain `,`).
      properties:
        key:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
        label: { type: string, maxLength: 120 }
        type:
          type: string
          enum: [enum, number, string, boolean, date]
        multi:
          type: boolean
          default: false
          description: |
            Only meaningful for `type:"enum"`. Implies `sortable:false`.
        options:
          type: array
          description: Required when `type:"enum"`. Items must not contain `,`.
          items: { type: string }
        unit: { type: string, nullable: true }
        sortable: { type: boolean, default: false }
        filterable: { type: boolean, default: true }
        defaultSort:
          type: string
          enum: [asc, desc]
          nullable: true
          description: At most one facet may declare this.

    CompiledProposal:
      type: object
      required: [title, voteOptions]
      properties:
        title: { type: string, maxLength: 200 }
        # description was dropped — use summary (short pitch) and
        # rationale (long-form argument) on externalProposal.snapshot.
        # Importers ingesting legacy data should map description → summary.
        # categories + tags were also dropped — declare per-ballot
        # facets via Ballot.facets[] and supply per-proposal values
        # via externalProposal.snapshot.facets.
        voteType:
          type: string
          enum: [choice, multi-choice, budget, weighted, ranked, scale, likert]
        voteIncrement: { type: number }
        voterBudget: { type: number }
        requireAnswer:
          type: boolean
          default: false
          description: >
            When true, voters must submit a selection — `{ abstain: true }` is
            rejected. Default false (permissive): abstain is allowed.
        voteOptions:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, label]
            properties:
              id:
                oneOf: [{ type: integer }, { type: string, enum: ["abstain"] }]
                description: Integer option id; the string "abstain" is a legacy sentinel retained for back-compat only.
              label: { type: string, maxLength: 120 }
              cost:
                type: number
                minimum: 0
                default: 1
                description: Per-option cost; only meaningful for voteType "budget". Defaults to 1.
              description:
                type: string
                maxLength: 1000
                description: Optional voter-facing blurb rendered alongside the option label.
              referenceUrl:
                type: string
                maxLength: 500
                description: Optional canonical "learn more" link for this specific option.
              imageUrl:
                type: string
                maxLength: 500
                description: Optional thumbnail / portrait URL (e.g. candidate headshot).
              metadata:
                type: object
                description: Free-form one-off attributes the frontend understands (e.g. candidate platform). No schema contract.
        data: { type: object }
        ipfsHash: { type: string, nullable: true }
        externalProposal:
          type: object
          required: [id]
          properties:
            id: { type: string }
            url: { type: string, nullable: true }
            snapshot:
              type: object
              required: [title, summary]
              properties:
                title: { type: string, maxLength: 200 }
                summary: { type: string, maxLength: 2000 }
                rationale: { type: string, maxLength: 10000, nullable: true }
                authors:
                  type: array
                  maxItems: 20
                  items: { type: string, maxLength: 120 }
                version: { type: string }
                facets:
                  type: object
                  description: |
                    Keys must match `Ballot.facets[].key`. Multi-value
                    enums use CSV (e.g. `"education,infrastructure"`).
                    Single-value enums carry no trailing comma.
                  additionalProperties:
                    oneOf:
                      - { type: string }
                      - { type: number }
                      - { type: boolean }

    Pagination:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }

    VoteSelection:
      type: object
      properties:
        questionId: { type: string }
        selection: { type: array, items: { type: number } }
        ranking: { type: array, items: { type: number } }
        weights:
          type: array
          items:
            type: object
            properties:
              option: { type: number }
              weight: { type: number }

    CoseWitness:
      type: object
      properties:
        key: { type: string, description: "signer key hash hex" }
        coseSign1Hex: { type: string }
        coseKeyHex: { type: string }
        signature: { type: string }

    DraftResponse:
      type: object
      properties:
        status: { type: string }
        package:
          type: object
          properties:
            id: { type: string }
            status: { type: string }
            nonce: { type: integer }
        signingPayload: { type: object }
        signingPayloadHex: { type: string }
        prelimVoteHash: { type: string }
        multisig: { $ref: "#/components/schemas/MultisigStatus", nullable: true }

    VotePackage:
      type: object
      properties:
        _id: { type: string }
        status:
          type: string
          enum: [draft, awaiting-signatures, awaiting-submission, broker-submitted, hydra-confirmed, failed, cancelled]
        nonce: { type: integer }
        voteHash: { type: string, nullable: true }
        hydraTxId: { type: string, nullable: true }
        ipfsCid: { type: string, nullable: true }
        confirmedAt: { type: string, format: date-time, nullable: true }
        signatures: { type: array, items: { $ref: "#/components/schemas/CoseWitness" } }

    MultisigStatus:
      type: object
      properties:
        required: { type: integer }
        eligibleKeys: { type: array, items: { type: string } }
        outstandingKeys: { type: array, items: { type: string } }
        satisfied: { type: boolean }

    Result:
      type: object
      properties:
        proposalId: { type: string }
        ballotId: { type: string, nullable: true }
        source: { type: string, enum: [provisional, final] }
        ballotSource: { type: string, enum: [legacy, hydra] }
        finalizedAt: { type: string, format: date-time, nullable: true }
        # Hydra settlement artifacts (populated only on source=="final")
        hydraEvidenceCid:
          type: string
          nullable: true
          description: IPFS CID of the directory of per-voter evidence files.
        hydraResultsCid:
          type: string
          nullable: true
          description: IPFS CID of the compact results JSON.
        hydraFinalizeTxHash:
          type: string
          nullable: true
          description: Hydra tx hash from the in-head /settle/finalize tx.
        hydraResultsHash:
          type: string
          nullable: true
          description: blake2b_256 of the canonical results JSON — anchored on the (601) datum for on-chain verification.
        hydraEvidenceMerkleRoot:
          type: string
          nullable: true
          description: Merkle root over the per-voter evidence files in the IPFS directory.
        hydraTotalVoters:
          type: integer
          nullable: true
          description: Number of voter tokens included in the final tally.
        hydraExcludedVoters:
          type: array
          description: Voter tokens excluded from the tally (evidence mismatch / missing). Each entry carries tokenName and reason.
          items:
            type: object
            properties:
              tokenName: { type: string }
              reason: { type: string }
        results:
          type: array
          items:
            type: object
            properties:
              id: { oneOf: [ { type: number }, { type: string } ] }
              label: { type: string }
              count: { type: integer }
              votingPower: { type: number }
        resultsByGroup: { type: object, nullable: true }
