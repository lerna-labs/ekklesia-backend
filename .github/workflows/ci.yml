name: CI

on:
  push:
    branches: [development, staging, main]
  pull_request:
    branches: [development, staging, main]

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # npm ci expands ${GITHUB_TOKEN} in .npmrc; the shared helpers package is
      # published to public npm, so this only needs to be present, not privileged.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MONGODB_URI_TEST: mongodb://localhost:27017/ekklesia_ci_test
      # preprod, not mainnet: helper/__tests__/verifySignature.test.js's
      # fixtures (calidus keys, pool registrations) live on preprod, and
      # NETWORK_NAME doesn't redirect the Koios host in the shared helpers
      # package -- API_URL is the only thing that does.
      API_URL: https://preprod.koios.rest/api/v1
      API_TOKEN: ${{ secrets.KOIOS_API_TOKEN }}
    steps:
      # Backport PRs carry content already validated on main. The job still runs
      # (so this required check reports success) but skips the heavy steps.
      - id: run
        run: echo "go=${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'backport') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        if: steps.run.outputs.go == 'true'
      - uses: actions/setup-node@v4
        if: steps.run.outputs.go == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.run.outputs.go == 'true'
      - run: npm run lint
        if: steps.run.outputs.go == 'true'
      - run: npm test
        if: steps.run.outputs.go == 'true'

  audit:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - id: run
        run: echo "go=${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'backport') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        if: steps.run.outputs.go == 'true'
      - uses: actions/setup-node@v4
        if: steps.run.outputs.go == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.run.outputs.go == 'true'
      - run: npm audit --omit=dev --audit-level=critical
        if: steps.run.outputs.go == 'true'

  changelog:
    # Require a changeset on feature PRs into development. The Release Manager's
    # own backport PRs (main -> development) carry no changeset and are exempt,
    # as are Dependabot PRs and anything labelled skip-changelog (docs- or CI-only).
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'development' &&
      github.event.pull_request.user.login != 'ekklesia-release-manager[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require a changeset
        run: |
          git fetch origin "${{ github.base_ref }}"
          changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '.changeset/*.md')
          if [ -z "$changed" ]; then
            echo "No changeset found. Run 'npx changeset' to add one, or label this PR 'skip-changelog' if it genuinely doesn't need a changelog entry."
            exit 1
          fi
